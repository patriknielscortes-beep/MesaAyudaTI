<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Editar Ticket</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">

    <div class="card shadow">

        <div class="card-body">

            <h2>Editar Ticket</h2>

            <form method="POST">

                <input
                    type="text"
                    name="titulo"
                    class="form-control mb-3"
                    value="{{ ticket[1] }}"
                    required>

                <textarea
                    name="descripcion"
                    class="form-control mb-3"
                    required>{{ ticket[2] }}</textarea>

                <select
                    name="prioridad"
                    class="form-select mb-3">

                    <option value="Baja"
                    {% if ticket[3] == "Baja" %}selected{% endif %}>
                    Baja
                    </option>

                    <option value="Media"
                    {% if ticket[3] == "Media" %}selected{% endif %}>
                    Media
                    </option>

                    <option value="Alta"
                    {% if ticket[3] == "Alta" %}selected{% endif %}>
                    Alta
                    </option>

                </select>

                <button
                    type="submit"
                    class="btn btn-success">

                    Guardar Cambios

                </button>

            </form>

        </div>

    </div>

</div>

</body>
</html>
