{% extends "base.html" %}

{% block titulo %}Cambiar Contraseña{% endblock %}

{% block contenido %}

<div class="row justify-content-center">

    <div class="col-md-5">

        <div class="card shadow">

            <div class="card-header bg-warning text-dark">
                <h4 class="mb-0">Cambiar Contraseña</h4>
            </div>

            <div class="card-body">

                <form method="POST">

                    <div class="mb-3">
                        <label>Contraseña actual</label>
                        <input type="password" name="password_actual" class="form-control" required>
                    </div>

                    <div class="mb-3">
                        <label>Nueva contraseña</label>
                        <input type="password" name="password_nueva" class="form-control" required>
                    </div>

                    <button class="btn btn-warning w-100">
                        Guardar cambios
                    </button>

                    <!-- volver -->
                <div class="mt-3 text-center">

                    {% if session.get("rol") == "admin" %}
                        <a href="/dashboard_admin" class="btn btn-outline-secondary btn-sm">Volver</a>

                    {% elif session.get("rol") == "tecnico" %}
                        <a href="/dashboard_tecnico" class="btn btn-outline-secondary btn-sm">Volver</a>

                    {% else %}
                        <a href="/dashboard_usuario" class="btn btn-outline-secondary btn-sm">Volver</a>
                    {% endif %}

                </div>

                </form>

            </div>

        </div>

    </div>

</div>

{% endblock %}
