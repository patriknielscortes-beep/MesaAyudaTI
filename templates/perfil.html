{% extends "base.html" %}

{% block titulo %}Mi Perfil{% endblock %}

{% block contenido %}

<div class="row justify-content-center">

    <div class="col-md-4">

        <div class="card shadow text-center">

            <div class="card-body">

                {% if usuario and usuario[2] %}
                    <img src="{{ url_for('static', filename='perfiles/' + usuario[2]) }}"
                         width="120"
                         height="120"
                         class="rounded-circle mb-3">
                {% else %}
                    <img src="{{ url_for('static', filename='perfiles/default.png') }}"
                         width="120"
                         height="120"
                         class="rounded-circle mb-3">
                {% endif %}

                <h4>{{ usuario[0] }}</h4>

                <p class="text-muted">{{ usuario[1] }}</p>

                <hr>

                <form action="/subir_foto" method="POST" enctype="multipart/form-data">

                    <input type="file" name="foto" class="form-control mb-2" required>

                    <button class="btn btn-primary w-100">
                        Subir foto
                    </button>

                </form>

                <a href="/cambiar_password" class="btn btn-warning w-100 mt-2">
                    Cambiar contraseña
                </a>

                <a href="/dashboard_usuario" class="btn btn-secondary w-100 mt-2">
                    Volver
                </a>

            </div>

        </div>

    </div>

</div>

{% endblock %}
