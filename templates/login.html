<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Mesa de Ayuda TI</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<style>

body{

    background:linear-gradient(135deg,#0d6efd,#001f54);

    height:100vh;

    display:flex;

    justify-content:center;

    align-items:center;

}

.card{

    width:430px;

    border:none;

    border-radius:20px;

    box-shadow:0 15px 35px rgba(0,0,0,.35);

    animation:aparecer .7s;

}

@keyframes aparecer{

from{

opacity:0;

transform:translateY(-25px);

}

to{

opacity:1;

transform:translateY(0);

}

}

.logo{

font-size:60px;

color:#0d6efd;

}

.btn-login{

width:100%;

font-size:18px;

}

.footer{

font-size:13px;

color:gray;

}

</style>

</head>

<body>

<div class="card">

<div class="card-body p-5">

<div class="text-center mb-4">

<i class="bi bi-headset logo"></i>

<h2 class="mt-2">

Mesa de Ayuda TI

</h2>

<p class="text-muted">

Sistema de Gestión de Incidentes

</p>

</div>

{% with messages = get_flashed_messages(with_categories=true) %}

{% if messages %}

{% for categoria,mensaje in messages %}

<div class="alert alert-{{ categoria }}">

{{ mensaje }}

</div>

{% endfor %}

{% endif %}

{% endwith %}

<form method="POST">

<div class="mb-3">

<label class="form-label">

Usuario

</label>

<div class="input-group">

<span class="input-group-text">

<i class="bi bi-person-fill"></i>

</span>

<input

type="text"

name="usuario"

class="form-control"

placeholder="Ingrese usuario"

required>

</div>

</div>

<div class="mb-4">

<label class="form-label">

Contraseña

</label>

<div class="input-group">

<span class="input-group-text">

<i class="bi bi-lock-fill"></i>

</span>

<input

type="password"

name="password"

id="password"

class="form-control"

placeholder="Ingrese contraseña"

required>

<button

type="button"

class="btn btn-outline-secondary"

onclick="mostrarPassword()">

<i class="bi bi-eye"></i>

</button>

</div>

</div>

<button

class="btn btn-primary btn-login">

<i class="bi bi-box-arrow-in-right"></i>

Ingresar

</button>

</form>

<hr>

<div class="text-center footer">

© 2026 Mesa de Ayuda TI

</div>

</div>

</div>

<script>

function mostrarPassword(){

let x=document.getElementById("password");

if(x.type==="password"){

x.type="text";

}else{

x.type="password";

}

}

</script>

</body>

</html>
