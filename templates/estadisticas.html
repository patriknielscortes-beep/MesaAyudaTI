<!DOCTYPE html>
<html lang="es">
<head>

    <meta charset="UTF-8">

    <title>Estadísticas</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<div class="container mt-5">

    <div class="card shadow">

        <div class="card-body">

            <h2>Estadísticas de Tickets</h2>

            <canvas id="grafico"></canvas>

            <br>

            {% if session["rol"] == "admin" %}
<a href="/dashboard_admin" class="btn btn-secondary">
    Volver
</a>

{% elif session["rol"] == "tecnico" %}
<a href="/dashboard_tecnico" class="btn btn-secondary">
    Volver
</a>

{% else %}
<a href="/dashboard_usuario" class="btn btn-secondary">
    Volver
</a>
{% endif %}
        </div>

    </div>

</div>

<script>

const ctx = document.getElementById('grafico');

new Chart(ctx, {

    type: 'bar',

    data: {

        labels: [
            'Abiertos',
            'En Proceso',
            'Cerrados'
        ],

        datasets: [{

            label: 'Cantidad de Tickets',

            data: [
                {{ abiertos }},
                {{ proceso }},
                {{ cerrados }}
            ]

        }]
    }

});

</script>

</body>
</html>
