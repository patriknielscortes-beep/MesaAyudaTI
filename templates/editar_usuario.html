{% extends "base.html" %}

{% block titulo %}
Editar Usuario
{% endblock %}

{% block contenido %}

<div class="container mt-4">

    <div class="row justify-content-center">

        <div class="col-lg-7">

            <div class="card shadow">

                <div class="card-header bg-primary text-white">

                    <h3 class="mb-0">
                        ✏️ Editar Usuario
                    </h3>

                </div>

                <div class="card-body">

                    <form method="POST">

                        <div class="mb-3">

                            <label class="form-label">
                                👤 Nombre de usuario
                            </label>

                            <input
                                type="text"
                                name="usuario"
                                class="form-control"
                                value="{{ usuario[1] }}"
                                required>

                        </div>


                        <div class="mb-3">

                            <label class="form-label">
                                🔑 Nueva contraseña
                            </label>

                            <input
                                type="password"
                                name="password"
                                class="form-control"
                                placeholder="Dejar vacío para conservar la contraseña">

                            <small class="text-muted">
                                Solo escriba una contraseña si desea cambiarla.
                            </small>

                        </div>


                        <div class="mb-4">

                            <label class="form-label">
                                🎭 Rol
                            </label>

                            <select
                                name="rol"
                                class="form-select">

                                <option value="admin"
                                {% if usuario[3]=="admin" %}selected{% endif %}>
                                    👑 Administrador
                                </option>

                                <option value="tecnico"
                                {% if usuario[3]=="tecnico" %}selected{% endif %}>
                                    🛠 Técnico
                                </option>

                                <option value="usuario"
                                {% if usuario[3]=="usuario" %}selected{% endif %}>
                                    👤 Usuario
                                </option>

                            </select>

                        </div>


                        <div class="d-flex justify-content-between">

                            <a href="/usuarios"
                               class="btn btn-secondary">

                                ⬅ Volver

                            </a>

                            <button
                                type="submit"
                                class="btn btn-primary">

                                💾 Guardar cambios

                            </button>

                        </div>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}
